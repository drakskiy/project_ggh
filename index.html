<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GGH Locations</title>

  <!-- changed to maplibre-->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: #0e1117;
      color: #f0f0ee; }
    #map {
      position : absolute;
      inset : 0 }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(14, 17, 23, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px 16px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      max-width: 360px;
    }
    .panel-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 12px;
    }

    .panel-title {
      font-family: "DM Mono", monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #f0f0ee;
    }

    .panel-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-weight: 300;
    }
    
    .search-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    input[type="search"] {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #f0f0ee;
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="search"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="search"]:focus { border-color: rgba(255,255,255,0.25); }
    input[type="search"]::-webkit-search-cancel-button { display: none; }

    .btn {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 11px;
      cursor: pointer;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.12); color: #f0f0ee; }

    /* slider */
    .slider-section {
      margin-bottom: 14px;
    }

    .slider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .slider-label {
      font-family: "DM Mono", monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    .slider-date {
      font-family: "DM Mono", monospace;
      font-size: 13px;
      font-weight: 500;
      color: #f0f0ee;
      letter-spacing: 0.03em;
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f0f0ee;
      border: 2px solid #0e1117;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f0f0ee;
      border: 2px solid #0e1117;
      cursor: pointer;
    }

    /* legend */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      padding: 10px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    .legend-dot.on-campus  { background: #5b9cf6; }
    .legend-dot.off-campus { background: #f76b6b; }

    /* count line */
    .count-line {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.03em;
    }

    /* popup */
    .maplibregl-popup-content {
      background: rgba(14, 17, 23, 0.97) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 10px !important;
      padding: 14px 16px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
      font-family: "DM Sans", sans-serif !important;
      color: #f0f0ee !important;
      min-width: 220px;
    }

    .maplibregl-popup-tip { display: none !important; }
    .maplibregl-popup-close-button {
      color: rgba(255,255,255,0.35) !important;
      font-size: 16px !important;
      padding: 4px 8px !important;
    }
    .maplibregl-popup-close-button:hover { color: #f0f0ee !important; }

    .popup-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .popup-row {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .popup-row strong {
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .popup-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-family: "DM Mono", monospace;
      letter-spacing: 0.04em;
    }
    .popup-tag.on-campus  { background: rgba(91,156,246,0.15); color: #5b9cf6; border: 1px solid rgba(91,156,246,0.3); }
    .popup-tag.off-campus { background: rgba(247,107,107,0.15); color: #f76b6b; border: 1px solid rgba(247,107,107,0.3); }

    /* maplibre attribution */
    .maplibregl-ctrl-attrib { font-size: 10px !important; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">GGH Locations</span>
      <span class="panel-subtitle">Click pins for more details.</span>
    </div>

    <!-- search -->
    <div class="search-row">
      <input id="search" type="search" placeholder="Search by location name" />
      <button class ="btn" id="resetBtn">Reset</button>
    </div>

    <!-- day slider -->
    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-label">Day <span id="dayNum">1</span></span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="slider-date" id="dateDisplay">Jan 01</span>
          <button class="btn" id="todayBtn">Today</button>
        </div>
      </div>
      <input id="daySlider" type="range" min="1" max="365" step="1" value="1" />
    </div>

    <!-- legend -->
     <div class="legend">
      <div class="legend-item">
        <div class="legend-dot on-campus"></div>
        <span>On-Campus</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot off-campus"></div>
        <span>Off-Campus</span>
      </div>
    </div>

     <div class="count-line" id="countLine"></div>
  </div>

  <script>
    /* ============================================================
       Section 1 — PINS LIST
       Format: { name: string, lat: number, lng: number, gghStartDay: number, gghEndDay: number, tag: string, notes: string }
       gghStartDay / gghEndDay: day of year integers (1–365)
       ============================================================ */
       const PINS = [
        { name: "Grizzly Peak (KPFA Tower pullout)", lat: 37.865212, lng: -122.222031, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Grizzly Peak (main pullout)", lat: 37.880425, lng: -122.230213, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Grizzly Peak (giant log pullout)", lat: 37.87220739, lng: -122.2205883, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Big C", lat: 37.874522, lng: -122.249583, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Berkeley Bay Vista", lat: 37.88042625, lng: -122.2476265, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Lawrence Hall of Science", lat: 37.878412, lng: -122.247044, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Albany Bulb", lat: 37.889647, lng: -122.32617, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Brickyard Cove", lat: 37.859649, lng: -122.305769, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Seaview Trail Vista", lat: 37.894071, lng: -122.234374, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Stonewall-Panoramic Trail Vista", lat: 37.865556, lng: -122.240573, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Cesar Chavez Park (north end)", lat: 37.87436317, lng: -122.3246235, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Cesar Chavez Park (south end)", lat: 37.869535, lng: -122.320194, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Point Emery", lat: 37.84572935, lng: -122.302198, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Emeryville Marina Park", lat: 37.8424286, lng: -122.3143674, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Bayview Pl", lat: 37.884162, lng: -122.263285, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Atlas Path Vista", lat: 37.88684051, lng: -122.2504151, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Grotto Rock Park", lat: 37.89342716, lng: -122.2687722, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Indian Rock Park", lat: 37.89221863, lng: -122.273079, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Joaquin Miller Park (Lookout Point)", lat: 37.81277606, lng: -122.1939463, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Picnic View Ridge", lat: 37.871524, lng: -122.229754, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Mt Diablo Summit Visitor Center", lat: 37.88180426, lng: -121.91429, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Barker Beach Alcatraz", lat: 37.826713, lng: -122.424502, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Treasure Island NW", lat: 37.826852, lng: -122.379041, gghStartDay: 1, gghEndDay: 31, tag: "Off-Campus", notes: "" },
        { name: "Clark Kerr Track", lat: 37.864703, lng: -122.246562, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "Evans Hall F10 Balcony", lat: 37.87343369, lng: -122.2580008, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "Graduate Theological Union Balcony", lat: 37.87541526, lng: -122.2620499, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "Ridge Path", lat: 37.8764492, lng: -122.2639368, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "Cal Memorial Stadium Concourse", lat: 37.87043189, lng: -122.2515015, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "Top of Campanile", lat: 37.87205781, lng: -122.2578749, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" },
        { name: "I-House Tower", lat: 37.86974275, lng: -122.2515375, gghStartDay: 1, gghEndDay: 31, tag: "On-Campus", notes: "" }
      ];

    /* ============================================================
       Section 2 — MAP SETTINGS
       ============================================================ */
      const MAPTILER_STYLE = "https://api.maptiler.com/maps/topo-v4/style.json?key=cv2lryclk9tg1QR6KCLy";
      const MAP_CENTER = [-122.2730, 37.8715];
      const START_ZOOM = 11.4;

      const COLOR_ON  = "#5b9cf6";
      const COLOR_OFF = "#f76b6b";

    /* ============================================================
       Section 3 — MAP INIT
       ============================================================ */
      
      const map = new maplibregl.Map({
      container: "map",
      style: MAPTILER_STYLE,
      center: MAP_CENTER,
      zoom: START_ZOOM,
      minZoom: 9,
      attributionControl: true,
    });

    map.addControl(new maplibregl.NavigationControl(), "bottom-right");

    /* ============================================================
       Section 4 — MARKERS RENDERING
       ============================================================ */
       // Build a GeoJSON FeatureCollection from visible pins
       function buildGeoJSON(visiblePins) {
        return {
          type: "FeatureCollection",
          features: visiblePins.map(pin => ({
            type: "Feature",
            geometry: { type: "Point", coordinates: [pin.lng, pin.lat] },
            properties: {
              name: pin.name,
              notes: pin.notes || "",
              tag: pin.tag,
              gghStartDay: pin.gghStartDay,
              gghEndDay: pin.gghEndDay,
              lat: pin.lat,
              lng: pin.lng,
            }
          }))
        };
      }

    // Add source + two circle layers once map loads
    map.on("load", () => {
      // Source (empty to start, we'll update after filters run)
      map.addSource("pins", {
        type: "geojson",
        data: buildGeoJSON([])
      });

      // Off-Campus layer (red)
      map.addLayer({
        id: "pins-off",
        source: "pins",
        type: "circle",
        filter: ["==", ["get", "tag"], "Off-Campus"],
        paint: {
          "circle-color": COLOR_OFF,
          "circle-radius": 7,
          "circle-opacity": 0.9,
          "circle-stroke-color": "rgba(255,255,255,0.6)",
          "circle-stroke-width": 1.5,
        }
      });

      // On-Campus layer (blue)
      map.addLayer({
        id: "pins-on",
        source: "pins",
        type: "circle",
        filter: ["==", ["get", "tag"], "On-Campus"],
        paint: {
          "circle-color": COLOR_ON,
          "circle-radius": 7,
          "circle-opacity": 0.9,
          "circle-stroke-color": "rgba(255,255,255,0.6)",
          "circle-stroke-width": 1.5,
        }
      });

      // Hover: pointer cursor
      ["pins-off", "pins-on"].forEach(layerId => {
        map.on("mouseenter", layerId, () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", layerId, () => map.getCanvas().style.cursor = "");

      // Click: show popup
       map.on("click", layerId, (e) => {
        const props = e.features[0].properties;
        // Format GGH date range        
        const start = Number(props.gghStartDay);
        const end   = Number(props.gghEndDay);
        const gghLine =
          start === end
          ? doyToDateStr(start)
          : `${doyToDateStr(start)} – ${doyToDateStr(end)}`;

      // Tag class (for styling)
      const tagClass =
        props.tag === "On-Campus" ? "on-campus" : "off-campus";

      // Optional notes block
      const notesHtml = props.notes
        ? `<div class="popup-row">${props.notes}</div>`
       : "";

      const html = `
        <div class="popup-name">${props.name}</div>
        <div class="popup-row">
        <strong>Coords:</strong>
        ${Number(props.lat).toFixed(5)}, ${Number(props.lng).toFixed(5)}
        </div>
        <div class="popup-row">
        <strong>GGH Dates:</strong> ${gghLine}
        </div>
        <span class="popup-tag ${tagClass}">${props.tag}</span>
        ${notesHtml}
  `   ;

  new maplibregl.Popup({ offset: 12, maxWidth: "280px" })
    .setLngLat(e.lngLat)
    .setHTML(html)
    .addTo(map);
});
      });

      // Initial render
      applyFilters();
    });

    /* ============================================================
       Section 5 — SEARCH UI
       ============================================================ */
      const searchInput = document.getElementById("search");
      const resetBtn = document.getElementById("resetBtn");
      const countLine = document.getElementById("countLine");

      searchInput.addEventListener("input", applyFilters);
      resetBtn.addEventListener("click", () => {
        searchInput.value = "";
        applyFilters();
      });

    /* ============================================================
       Section — DAY SLIDER
       ============================================================ */

      function applyFilters() {
        const query = document.getElementById("search").value.trim().toLowerCase();
        const day   = Number(document.getElementById("daySlider").value);

        const visible = PINS.filter(pin => {
          const matchesSearch = 
            query === "" ||
            pin.name.toLowerCase().includes(query) ||
            (pin.notes || "").toLowerCase().includes(query);

          const matchesDay = 
            day >= pin.gghStartDay && day <= pin.gghEndDay;

          return matchesSearch && matchesDay;
      });

      // Update the MapLibre source with new GeoJSON
      const source = map.getSource("pins");
      if (source) source.setData(buildGeoJSON(visible));

      // Update count line
      const n = visible.length;
      document.getElementById("countLine").textContent =
        `Showing ${n} pin${n === 1 ? "" : "s"} of ${PINS.length}`;
    }

      const daySlider = document.getElementById("daySlider");
      const dayNum = document.getElementById("dayNum");
      const dateDisplay = document.getElementById("dateDisplay");
      const todayBtn = document.getElementById("todayBtn");

      const TIMEZONE = "America/Los_Angeles";
      const SLIDER_YEAR = 2026; // hard-set to 2026 for now

      function isLeapYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
      }
      const MAX_DOY = isLeapYear(SLIDER_YEAR) ? 366 : 365;
      daySlider.max = String(MAX_DOY);

      // convert doy to formatted PST date
      function doyToDateStr(doy, year = SLIDER_YEAR) {
        // 01/01 in PST
        const d = new Date(SLIDER_YEAR, 0, 1);
        d.setDate(Number(doy));
        return d.toLocaleDateString("en-US", { month: "short", day: "2-digit" });
      }

      // get today's PST doy
      function getTodayDOY() {
        const now = new Date();
        const start = new Date(SLIDER_YEAR, 0, 1);
        return Math.floor((now - start) / 86400000) + 1;
      }

      function setDay(doy) {
        const v = Math.min(MAX_DOY, Math.max(1, Number(doy)));
        daySlider.value      = v;
        dayNum.textContent   = v;
        dateDisplay.textContent = doyToDateStr(v);
        if (map.isStyleLoaded()) applyFilters();
      }

      daySlider.addEventListener("input", (e) => {
        setDay(e.target.value);
      });

      todayBtn.addEventListener("click", () => {
        setDay(getTodayDOY());
      });

      // initialize
      setDay(1);

    /* ============================================================
       Section 6 — HELPERS + BOOT
       ============================================================ */
      
  </script>
</body>
</html>
